  <rect x="247" y="327" width="56" height="6" rx="3" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="226" y="343" width="15" height="15" rx="3.5"
    fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-width="2.5"/>
  <polyline points="228,351 232,355 238,345"
    fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="247" y="347" width="44" height="6" rx="3" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="226" y="363" width="15" height="15" rx="3.5"
    fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-width="2.5"/>
  <rect x="247" y="367" width="52" height="6" rx="3" fill="#ffffff" fill-opacity="0.25"/>

  <!-- AMALIYOT -->
  <text x="256" y="428"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="38" font-weight="900"
    letter-spacing="5"
    fill="#ffffff" fill-opacity="0.96">AMALIYOT</text>

  <!-- Floating dots -->
  <circle cx="408" cy="112" r="22" fill="url(#dotO)"/>
  <circle cx="400" cy="104" r="8" fill="#ffffff" fill-opacity="0.28"/>

  <circle cx="442" cy="310" r="13" fill="url(#dotG)"/>
