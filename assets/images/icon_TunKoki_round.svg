    stroke-linejoin="round" stroke-linecap="round"/>

  <path d="M 172,175 L 172,258 Q 172,286 256,299 Q 340,286 340,258 L 340,175"
    fill="none" stroke="#ffffff" stroke-width="10"
    stroke-linejoin="round" stroke-linecap="round"/>

  <line x1="172" y1="175" x2="172" y2="262"
    stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>

  <circle cx="172" cy="271" r="14"
    fill="none" stroke="#ffffff" stroke-width="7"/>

  <line x1="165" y1="285" x2="155" y2="320" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="172" y1="285" x2="172" y2="322" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="179" y1="285" x2="189" y2="320" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Checklist card -->
  <rect x="216" y="312" width="96" height="72" rx="11"
    fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-width="4.5" stroke-opacity="0.65"/>
  <rect x="226" y="323" width="15" height="15" rx="3.5"
    fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-width="2.5"/>
  <polyline points="228,331 232,335 238,325"
