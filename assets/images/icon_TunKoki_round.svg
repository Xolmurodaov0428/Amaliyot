<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="circ"><circle cx="256" cy="256" r="256"/></clipPath>

  <radialGradient id="bgMain" cx="38%" cy="32%" r="75%">
    <stop offset="0%" stop-color="#1a5fcc"/>
    <stop offset="45%" stop-color="#0a2f88"/>
    <stop offset="100%" stop-color="#030e2a"/>
  </radialGradient>

  <radialGradient id="glowTop" cx="35%" cy="28%" r="55%">
    <stop offset="0%" stop-color="#4488ff" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="glowBottom" cx="75%" cy="70%" r="45%">
    <stop offset="0%" stop-color="#003399" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#003399" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="shine" cx="35%" cy="22%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="dotO" cx="30%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#ffcc55"/>
    <stop offset="100%" stop-color="#ff8800"/>
  </radialGradient>
  <radialGradient id="dotG" cx="30%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#88ffdd"/>
    <stop offset="100%" stop-color="#00bbaa"/>
  </radialGradient>
  <radialGradient id="dotP" cx="30%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#cc88ff"/>
    <stop offset="100%" stop-color="#8800dd"/>
  </radialGradient>
  <radialGradient id="dotC" cx="30%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#aaddff"/>
    <stop offset="100%" stop-color="#2299ff"/>
  </radialGradient>

  <filter id="gf"><feGaussianBlur stdDeviation="32"/></filter>
</defs>

<g clip-path="url(#circ)">

  <!-- Base -->
  <rect width="512" height="512" fill="url(#bgMain)"/>

  <!-- Glows -->
  <ellipse cx="185" cy="185" rx="195" ry="185" fill="url(#glowTop)" filter="url(#gf)"/>
  <ellipse cx="360" cy="330" rx="170" ry="155" fill="url(#glowBottom)" filter="url(#gf)"/>

  <!-- Stars -->
  <circle cx="58" cy="45" r="1.8" fill="#ffffff" fill-opacity="0.7"/>
  <circle cx="140" cy="28" r="1.2" fill="#ffffff" fill-opacity="0.55"/>
  <circle cx="210" cy="55" r="1.8" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="355" cy="38" r="1.2" fill="#ffffff" fill-opacity="0.65"/>
  <circle cx="430" cy="65" r="2.2" fill="#ffffff" fill-opacity="0.6"/>
  <circle cx="475" cy="28" r="1.2" fill="#ffffff" fill-opacity="0.45"/>
  <circle cx="488" cy="108" r="1.8" fill="#ffffff" fill-opacity="0.55"/>
  <circle cx="38" cy="160" r="1.2" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="72" cy="435" r="1.8" fill="#ffffff" fill-opacity="0.35"/>
  <circle cx="460" cy="455" r="1.2" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="495" cy="395" r="1.8" fill="#ffffff" fill-opacity="0.5"/>
